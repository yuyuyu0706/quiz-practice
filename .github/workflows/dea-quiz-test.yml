name: dea-quiz-tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Validate DEA questions.json
        run: npm run validate:dea-questions

      - name: Run DEA Playwright tests
        run: npx playwright test tests/e2e/dea-*.spec.ts

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dea-playwright-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
