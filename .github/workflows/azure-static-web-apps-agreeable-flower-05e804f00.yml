name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      - uses: actions/checkout@v4

      - name: Prepare Static Web Apps artifact
        run: |
          rm -rf swa-site
          mkdir -p swa-site

          cp -R swa-root/. swa-site/
          cp -R dea-quiz-app swa-site/dea-quiz-app
          cp -R dea-quiz-app-plus swa-site/dea-quiz-app-plus
          cp -R dep-quiz-app swa-site/dep-quiz-app

          echo "Deploy artifact:"
          find swa-site -maxdepth 2 -type f | sort

      - name: Validate Static Web Apps artifact
        run: npm run validate:swa-artifact

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_AGREEABLE_FLOWER_05E804F00 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: 'swa-site'
          api_location: ''
          output_location: ''
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job

    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_AGREEABLE_FLOWER_05E804F00 }}
          action: 'close'
