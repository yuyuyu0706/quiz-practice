name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      - uses: actions/checkout@v4

      - name: Prepare Static Web Apps artifact
        run: |
          rm -rf swa-site
          mkdir -p swa-site

          cp -R dea-quiz-app swa-site/dea-quiz-app
          cp -R dep-quiz-app swa-site/dep-quiz-app

          cat > swa-site/index.html <<'EOF'
          <!doctype html>
          <html lang="ja">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Quiz Practice</title>
            <style>
              body {
                font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                max-width: 720px;
                margin: 48px auto;
                padding: 0 20px;
                line-height: 1.7;
              }
              a {
                display: block;
                padding: 16px 20px;
                margin: 12px 0;
                border: 1px solid #ddd;
                border-radius: 12px;
                text-decoration: none;
                color: inherit;
              }
              a:hover {
                background: #f7f7f7;
              }
            </style>
          </head>
          <body>
            <h1>Quiz Practice</h1>
            <p>利用する練習アプリを選択してください。</p>
            <a href="./dea-quiz-app/">Databricks DEA 練習アプリ</a>
            <a href="./dep-quiz-app/">Databricks DEP 練習アプリ</a>
          </body>
          </html>
          EOF

          echo "Deploy artifact:"
          find swa-site -maxdepth 2 -type f | sort

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_AGREEABLE_FLOWER_05E804F00 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "swa-site"
          api_location: ""
          output_location: ""
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job

    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_AGREEABLE_FLOWER_05E804F00 }}
          action: "close"

