<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DEA Audio Learn</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
    <script src="app.js" defer></script>
  </head>
  <body>
    <header class="hero">
      <div class="hero__inner">
        <p class="eyebrow">Databricks Certified Data Engineer Associate</p>
        <h1>DEA Audio Learn</h1>
        <p class="hero__lead">
          DEA試験対策を、音声教材を主軸に少しずつ進める音声インプット教材MVPです。
        </p>
      </div>
    </header>

    <main class="layout" aria-live="polite">
      <article class="panel meta-card" aria-labelledby="selected-chapter-title">
        <div class="meta-card__heading">
          <div>
            <p id="selected-domain" class="eyebrow">-</p>
            <h2 id="selected-chapter-title">チャプターを読み込み中...</h2>
            <div class="chapter-pills" aria-label="チャプター情報">
              <span class="info-pill" id="selected-minutes">音声目安：-</span>
              <span class="info-pill" id="selected-status">-</span>
            </div>
          </div>
        </div>
        <nav class="chapter-nav" aria-label="チャプター移動">
          <button id="previous-chapter" class="nav-button nav-button--secondary" type="button">
            前へ
          </button>
          <button id="next-chapter" class="nav-button" type="button">次へ</button>
        </nav>
      </article>

      <aside class="panel chapter-panel" aria-labelledby="chapter-list-title">
        <details id="chapter-selector" class="chapter-selector" open>
          <summary id="chapter-list-title">チャプターを選択する</summary>
          <div id="chapter-list" class="chapter-list" aria-live="polite">読み込み中...</div>
        </details>
      </aside>

      <section class="panel learning-steps" aria-labelledby="learning-steps-title">
        <div class="section-heading section-heading--compact">
          <h2 id="learning-steps-title">学習ステップ</h2>
        </div>
        <ol class="step-list">
          <li class="step-item step-item--available"><span>聞く</span><strong>利用可能</strong></li>
          <li class="step-item"><span>要点</span><strong>Phase 6で追加予定</strong></li>
          <li class="step-item"><span>解く</span><strong>Phase 7で追加予定</strong></li>
          <li class="step-item"><span>記録</span><strong>Phase 8で追加予定</strong></li>
        </ol>
      </section>

      <details class="panel markdown-card audio-card audio-card--primary" open>
        <summary>音声教材</summary>
        <div class="speech-controls" aria-label="読み上げ操作">
          <button id="speech-toggle" class="speech-button" type="button">再生</button>
          <label class="speech-rate">
            <span>速度</span>
            <select id="speech-rate" aria-label="読み上げ速度">
              <option value="0.8">0.8x</option>
              <option value="1" selected>1.0x</option>
              <option value="1.2">1.2x</option>
            </select>
          </label>
          <span id="speech-status" class="speech-status" role="status">未再生</span>
        </div>
        <p id="speech-message" class="speech-message" hidden></p>
        <div id="audio-script-markdown" class="markdown-body">音声スクリプトを読み込み中...</div>
      </details>

      <aside class="panel note-placeholder" aria-labelledby="note-placeholder-title">
        <div class="section-heading">
          <p class="eyebrow">Key notes</p>
          <h2 id="note-placeholder-title">要点メモ</h2>
        </div>
        <p>Phase 6で追加予定</p>
      </aside>
    </main>
  </body>
</html>
