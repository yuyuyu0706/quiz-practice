<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Databricks Certified Data Engineer Associate Quiz Plus</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="app-header">
        <h1>Databricks Certified DEA Quiz Plus</h1>
        <p class="subtitle">Associate 試験対策 Plus・4択・解説つき</p>
      </header>

      <section id="home-view" class="card view active">
        <h2>学習設定</h2>
        <form id="settings-form">
          <fieldset>
            <legend>出題範囲（セクション）</legend>
            <div class="chips" id="section-checkboxes"></div>
          </fieldset>

          <fieldset>
            <legend>出題モード</legend>
            <label><input type="radio" name="mode" value="normal" checked /> 通常（順番）</label>
            <label><input type="radio" name="mode" value="random" /> ランダム</label>
            <label><input type="radio" name="mode" value="wrongOnly" /> 間違いのみ</label>
            <label><input type="radio" name="mode" value="bookmarks" /> ブックマークのみ</label>
          </fieldset>

          <label for="question-count">出題数</label>
          <select id="question-count" name="count">
            <option value="10">10</option>
            <option value="20">20</option>
            <option value="50" selected>50</option>
            <option value="all">全問</option>
          </select>

          <div class="button-row">
            <button type="submit" class="primary">開始</button>
            <button type="button" id="resume-btn" class="hidden">続きから再開</button>
            <button type="button" id="discard-session-btn" class="hidden">中断データを削除</button>
          </div>
        </form>
        <p id="home-message" class="message"></p>
      </section>

      <section id="quiz-view" class="card view">
        <div id="quiz-top-anchor" class="quiz-top-anchor" aria-hidden="true"></div>
        <div class="quiz-head">
          <p id="quiz-section"></p>
          <p id="quiz-progress"></p>
        </div>
        <h2 id="quiz-question"></h2>
        <form id="choices-form" class="choices"></form>
        <p id="result-indicator" class="indicator"></p>
        <div class="button-group button-group-primary" aria-label="主要操作">
          <div class="button-row button-row-primary">
            <button id="submit-answer" class="primary">回答する</button>
            <button id="next-question" type="button" class="primary" disabled>次へ</button>
          </div>
          <p id="selection-hint" class="selection-hint">選択肢を選ぶと「回答する」が押せます。</p>
        </div>
        <div class="button-group button-group-secondary" aria-label="補助操作">
          <div class="button-row button-row-secondary-top">
            <button
              id="secondary-actions-toggle"
              class="secondary-actions-toggle"
              type="button"
              aria-expanded="false"
              aria-controls="secondary-actions-panel"
            >
              その他の操作
            </button>
            <div id="suspend-mobile-slot" class="secondary-home-slot"></div>
          </div>
          <div id="secondary-actions-panel" class="secondary-actions-panel">
            <div class="button-row wrap button-row-secondary">
              <button id="prev-question" type="button">前へ</button>
              <button id="toggle-explanation" type="button">解説を表示</button>
              <button id="bookmark-btn" type="button">ブックマーク☆</button>
              <div id="suspend-desktop-slot" class="secondary-home-slot"></div>
            </div>
          </div>
          <button id="suspend-to-home" type="button" class="danger-secondary">
            中断してホームへ
          </button>
        </div>
        <article id="explanation" class="explanation hidden"></article>
        <div
          id="explanation-action-row"
          class="button-group button-group-primary explanation-actions hidden"
          aria-label="解説後の主要操作"
        >
          <p class="selection-hint explanation-hint">
            解説を読み終えたら、ここから次の問題へ進めます。
          </p>
          <div class="button-row button-row-primary">
            <button id="next-question-inline" type="button" class="primary">次へ進む</button>
          </div>
        </div>
        <p id="quiz-message" class="message" role="status" aria-live="polite"></p>
      </section>

      <section id="result-view" class="card view">
        <h2>結果</h2>
        <p id="score-text"></p>
        <p id="section-score-text"></p>
        <h3>間違い問題</h3>
        <ul id="wrong-list"></ul>
        <div class="button-row wrap">
          <button id="retry-wrong" class="primary">間違いのみ復習を開始</button>
          <button id="back-home">ホームへ</button>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
